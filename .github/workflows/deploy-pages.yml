name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Setup e Execução do Go na Raiz
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Generate ASN Data
        run: |
          # Executa na raiz, gerando arquivos em ./public/api/asn/
          go run main.go
          
      # 2. Setup e Build do Vue no subdiretório
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          
      - name: Build Vue App
        working-directory: ./netmirror
        run: |
          npm ci
          npm run build

      # 3. Consolidação Robusta (Usando caminhos explícitos da raiz)
      - name: Consolidate Deployment Directory
        run: |
          # Criamos a pasta final de deploy na raiz
          mkdir -p deploy-dist
          
          # 1. Copia o build do Vue (que está em netmirror/dist)
          cp -r netmirror/dist/* deploy-dist/
          
          # 2. Cria a estrutura da API e copia os dados gerados pelo Go (que estão na raiz/public)
          mkdir -p deploy-dist/api/asn
          if [ -d "public/api/asn" ]; then
            cp -r public/api/asn/* deploy-dist/api/asn/
          else
            echo "Erro: pasta public/api/asn não encontrada na raiz!"
            exit 1
          fi
          
          # 3. Injeção de assets do portfólio
          mkdir -p deploy-dist/assets
          cp -r portfolio-assets/* deploy-dist/assets/ || true

      # 4. Debug (Opcional, mas útil para validar se os arquivos estão lá)
      - name: List files in deploy directory
        run: ls -R deploy-dist/api/asn/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy-dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
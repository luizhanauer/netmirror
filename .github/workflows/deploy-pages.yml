name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Setup Go e Geração de Dados
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Generate and Inject ASN Data
        run: |
          # Executa a lógica de domínio em Go (Gera arquivos em ./public/api/asn)
          go run main.go
          
          # Cria a estrutura de pastas no Vue
          mkdir -p netmirror/public/api
          
          # Remove a pasta de destino caso exista para evitar aninhamento
          rm -rf netmirror/public/api/asn
          
          # Copia a DIRETÓRIO inteiro em vez de usar '*'
          # Isso evita o erro "Argument list too long"
          if [ -d "public/api/asn" ]; then
            cp -r public/api/asn netmirror/public/api/
            echo "Diretório ASN injetado com sucesso."
          else
            echo "Erro: Diretório de origem public/api/asn não encontrado."
            exit 1
          fi

      # 2. Setup Node e Build do Vue
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          
      - name: Build Vue App
        working-directory: ./netmirror
        run: |
          npm ci
          npm run build
          
      # 3. Injeção de Assets do Portfólio
      - name: Inject Portfolio Screenshots
        run: |
          mkdir -p netmirror/dist/assets
          cp -r portfolio-assets/* netmirror/dist/assets/ || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 4. Upload e Deploy
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './netmirror/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
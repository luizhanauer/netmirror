name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Setup Go e Geração de Dados
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Generate and Inject ASN Data
        run: |
          # 1. Executa a lógica de domínio em Go
          go run main.go
          
          # 2. Garante que a pasta public do Vue existe e está limpa para receber os dados
          mkdir -p netmirror/public/api/asn
          
          # 3. Move os arquivos gerados na raiz para dentro da estrutura do Vue
          # Isso faz com que o Vue 'enxergue' esses arquivos como assets estáticos nativos
          if [ -d "public/api/asn" ]; then
            cp -r public/api/asn/* netmirror/public/api/asn/
            echo "Dados ASN injetados no diretório public do Vue com sucesso."
          else
            echo "Erro: Os arquivos Go não foram encontrados em public/api/asn"
            exit 1
          fi

      # 2. Setup Node e Build do Vue (Agora contendo os dados do Go)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          
      - name: Build Vue App
        working-directory: ./netmirror
        run: |
          npm ci
          npm run build
          
      # 3. Injeção de Assets Externos (Portfolio) diretamente no Dist final
      # Como esses assets não fazem parte do código-fonte do app, injetamos no final
      - name: Inject Portfolio Screenshots
        run: |
          mkdir -p netmirror/dist/assets
          cp -r portfolio-assets/* netmirror/dist/assets/ || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 4. Upload do Artifact (Apenas a pasta dist do Vue, que já está completa)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './netmirror/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4